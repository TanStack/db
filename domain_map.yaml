    domain: "custom-adapter"
    description: "Building custom collection adapters for new backends"
    type: "core"
    covers:
      - "SyncConfig interface (sync, getSyncMetadata, rowUpdateMode)"
      - "Sync primitives (begin, write, commit, markReady, truncate)"
