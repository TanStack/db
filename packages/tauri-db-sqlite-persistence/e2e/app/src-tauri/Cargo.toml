[package]
name = "tauri-db-sqlite-persistence-e2e-app"
version = "0.0.0"
description = "Repo-local Tauri e2e harness for TanStack DB SQLite persistence"
authors = ["TanStack Team"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
serde_json = "1.0.149"
tauri = { version = "2.10.3", features = [] }
tauri-plugin-sql = { version = "2.4.0", features = ["sqlite"] }
